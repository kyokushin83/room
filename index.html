<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>펫 미션 시작</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: linear-gradient(180deg, #fff7e8 0%, #ffffff 50%, #f3f6ff 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 24px 20px 40px;
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 28px;
      padding: 28px 22px 32px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.12);
    }

    .emoji {
      font-size: 64px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      letter-spacing: -0.04em;
    }

    .desc {
      font-size: 16px;
      color: #555;
      margin-bottom: 22px;
      line-height: 1.5;
    }

    .info {
      background: #f7f7f7;
      border-radius: 16px;
      padding: 14px;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .start-btn {
      width: 100%;
      padding: 18px;
      border-radius: 20px;
      border: none;
      font-size: 18px;
      font-weight: 900;
      background: #222;
      color: white;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(0,0,0,0.2);
    }

    .start-btn:active {
      transform: scale(0.97);
    }

    .sub {
      margin-top: 16px;
      font-size: 13px;
      color: #888;
    }

    @media (min-width: 768px) {
      body { align-items: flex-start; padding-top: 40px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">

      <div class="emoji">🐶🔍</div>

      <h1>펫 미션 시작</h1>

      <p class="desc">
        사라진 강아지를 찾기 위한 탐정 미션이 시작됩니다.
        단서를 따라 이동하며 모든 미션을 완료하세요!
      </p>

      <div class="info">
        ⏱ 총 소요 시간: 약 60분<br/>
        👨‍👩‍👧 가족 / 커플 모두 참여 가능<br/>
        📍 지하상가 전체 이동형 미션
      </div>

      <button class="start-btn" onclick="startMission()">
        미션 시작하기 🚀
      </button>

      <div class="sub">버튼을 누르면 첫 번째 미션으로 이동합니다</div>

    </div>
  </div>

  <script>
    function startMission() {
      window.location.href = "mission1.html";
    }
  </script>
</body>
</html>
