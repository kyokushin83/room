<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>미션 1 정답</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: #efe9dd;
      color: #222;
      min-height: 100vh;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      padding: 22px 18px 32px;
      background: linear-gradient(180deg, #fff0f0 0%, #ffffff 55%, #f4fff7 100%);
      box-shadow: 0 0 40px rgba(0,0,0,0.12);
    }

    .badge {
      display: inline-flex;
      padding: 6px 12px;
      border-radius: 999px;
      background: #222;
      color: white;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .card {
      background: white;
      border-radius: 26px;
      padding: 24px 20px;
      box-shadow: 0 14px 34px rgba(80, 40, 40, 0.1);
      margin-bottom: 14px;
    }

    .emoji {
      font-size: 52px;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 28px;
      line-height: 1.25;
      letter-spacing: -0.04em;
      margin-bottom: 12px;
    }

    p {
      font-size: 16px;
      line-height: 1.65;
      color: #333;
    }

    .answer-box {
      background: #fff4df;
      border: 2px solid #ffb25f;
      border-radius: 20px;
      padding: 18px;
      margin-top: 14px;
      font-size: 17px;
      font-weight: 900;
      color: #8a3d00;
    }

    .image-box {
      width: 100%;
      min-height: 200px;
      border-radius: 20px;
      background: #eeeeee;
      border: 2px dashed #cccccc;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #777;
      font-size: 14px;
      text-align: center;
      padding: 20px;
      margin-top: 14px;
    }

    .next-box {
      background: #eaffef;
      border: 1px solid #b8efc5;
      border-radius: 20px;
      padding: 18px;
      margin-top: 14px;
      color: #124d22;
    }

    .next-box strong {
      display: block;
      font-size: 18px;
      margin-bottom: 6px;
    }

    .bottom {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 16px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }

    .back-btn {
      background: #222;
      color: white;
    }

    .mission-btn {
      background: #6e5cff;
      color: white;
    }

    @media (min-width: 768px) {
      .wrap { padding: 32px 0; align-items: flex-start; }
      .page { min-height: auto; border-radius: 32px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="page">
      <div class="badge">MISSION 01 · ANSWER</div>

      <section class="card">
        <div class="emoji">👀🐾</div>
        <h1>정답 위치</h1>
        <p>
          그래도 마지막 단서를 찾기 어렵다면 아래 정답 위치를 확인하세요.
          정답을 확인한 뒤, 해당 위치의 QR코드를 스캔하면 다음 미션으로 이동할 수 있습니다.
        </p>

        <div class="answer-box">
          마지막 QR코드는 토끼 발자국이 끝나는 지점 근처,
          지하상가 통로의 벽면 또는 기둥 주변에 있습니다.
        </div>

        <div class="image-box">
          여기에 정답 위치 이미지 넣기<br />
          예: 마지막 QR 위치 사진 + 화살표 표시<br />
          파일명 예시: answer1.jpg
        </div>

        <div class="next-box">
          <strong>다음 단계</strong>
          정답 위치에서 QR코드를 스캔하세요.<br />
          QR을 찍으면 다음 미션으로 이동합니다.
        </div>
      </section>

      <div class="bottom">
        <button class="back-btn" onclick="location.href='mission1.html'">미션으로 돌아가기</button>
        <button class="mission-btn" onclick="location.href='mission2.html'">다음 미션 페이지 테스트</button>
      </div>
    </main>
  </div>
</body>
</html>
